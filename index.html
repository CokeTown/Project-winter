<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title data-i18n="doc.title">Nine Winters</title>
<meta name="theme-color" content="#0e1014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nine Winters">
<link rel="manifest" href="%BASE_URL%manifest.webmanifest">
<link rel="icon" type="image/png" href="%BASE_URL%favicon.png">
<link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png">

</head>
<body>
<canvas id="c"></canvas>
<canvas id="fx"></canvas>
<div id="loading" data-i18n="loading">SHELTER LOADING . . .</div>
<!-- 모든 페이지 로드는 암전에서 시작 — 스타일시트/JS 로드 전의 맨 HTML이 절대 보이지 않도록
     핵심 스타일을 인라인으로 박는다. 부팅 완료 시 game.js가 페이드아웃. -->
<div id="fade-veil" style="position:fixed;inset:0;background:#07080b;opacity:1;pointer-events:auto;z-index:999"></div>

<div id="title-screen" style="display:none">
  <div id="title-inner">
    <div id="title-logo">NINE<br>WINTERS</div>
    <div id="title-menu">
      <button class="pixel-btn primary" id="t-continue" style="display:none"><span data-i18n="title.continue">▶ 이어하기</span><br><span id="t-continue-info" style="font-size:9px;color:var(--text-dim)"></span></button>
      <button class="pixel-btn" id="t-new" data-i18n="title.new">✚ 새 게임</button>
      <button class="pixel-btn" id="t-load" data-i18n="title.load">💾 불러오기</button>
      <button class="pixel-btn" id="t-help" data-i18n="title.help">❓ 살아남는 법</button>
      <div id="title-lang">
        <button class="pixel-btn lang-btn" id="lang-ko">한국어</button>
        <button class="pixel-btn lang-btn" id="lang-en">English</button>
      </div>
      <div id="title-tools">
        <button class="pixel-btn" id="t-export" data-i18n-title="title.tools.export" title="세이브 내보내기">💾</button>
        <button class="pixel-btn" id="t-import" data-i18n-title="title.tools.import" title="세이브 가져오기">📂</button>
        <button class="pixel-btn" id="t-settings" data-i18n-title="title.tools.settings" title="설정">⚙️</button>
      </div>
    </div>
    <div id="title-ver" data-i18n="title.ver">Nine Winters · web build</div>
  </div>
</div>

<div id="intro-screen" style="display:none">
  <div id="intro-text"></div>
  <button class="pixel-btn primary" id="intro-next" data-i18n="intro.next">계속 ▸</button>
</div>

<div id="ending-screen" style="display:none">
  <div id="ending-text"></div>
  <button class="pixel-btn primary" id="ending-next" data-i18n="intro.next">계속 ▸</button>
</div>

<div class="panel" id="hud">
  <div class="shelter-name" id="hud-shelter" data-i18n="hud.shelter">🏚️ 셸터</div>
  <div class="stat" id="hud-stat" data-i18n="hud.stat">성공한 탐험 0회</div>
  <div id="gauges">
    <div class="gauge" id="g-hunger" data-i18n-title="g.hunger.title" title="배고픔 — 클릭하면 음식을 먹습니다"><div class="g-fill"></div><span class="g-label">🥫 80</span></div>
    <div class="gauge" id="g-thirst" data-i18n-title="g.thirst.title" title="갈증 — 클릭하면 물을 마십니다"><div class="g-fill"></div><span class="g-label">💧 80</span></div>
    <div class="gauge" id="g-energy" data-i18n-title="g.energy.title" title="에너지 — 탐험마다 소모, 취침으로 회복"><div class="g-fill"></div><span class="g-label">⚡ 100</span></div>
  </div>
  <div class="btn-row icons">
    <button class="pixel-btn primary" id="btn-exp" data-i18n-title="btn.exp.title" title="탐험 (지도)">🎒</button>
    <button class="pixel-btn" id="btn-move" data-i18n-title="btn.move.title" title="이주">🏠</button>
    <button class="pixel-btn" id="btn-craft" data-i18n-title="btn.craft.title" title="제작대">🔨</button>
    <button class="pixel-btn" id="btn-clean" data-i18n-title="btn.clean.title" title="청소 (물 1 → 청결 +20)">🧹</button>
    <button class="pixel-btn" id="btn-sleep" data-i18n-title="btn.sleep.title" title="취침 — 내일 아침까지 자고 에너지 회복">🛌</button>
    <button class="pixel-btn" id="btn-journal" data-i18n-title="btn.journal.title" title="일지 (도감·업적·통계)">📖</button>
    <button class="pixel-btn" id="btn-help" data-i18n-title="btn.help.title" title="튜토리얼">🎓</button>
  </div>
</div>

<div class="panel" id="res-bar"><div id="res-chips"></div></div>

<div class="panel" id="clock-panel">
  <div id="lcd">
    <div id="lcd-day">DAY 01</div>
    <div id="lcd-time">08<span id="lcd-colon">:</span>00</div>
    <div id="lcd-sub">🌅 아침 · 🌤️</div>
  </div>
</div>

<div id="cam-ctrl">
  <button class="cam-btn" id="cam-rotl" data-i18n-title="cam.rotl.title" title="시점 좌회전 (Q)">⟲</button>
  <button class="cam-btn" id="cam-rotr" data-i18n-title="cam.rotr.title" title="시점 우회전 (E)">⟳</button>
  <button class="cam-btn" id="cam-zin" data-i18n-title="cam.zin.title" title="줌 인">＋</button>
  <button class="cam-btn" id="cam-zout" data-i18n-title="cam.zout.title" title="줌 아웃">－</button>
  <button class="cam-btn" id="cam-home" data-i18n-title="cam.home.title" title="시점 초기화">⌂</button>
  <button class="cam-btn" id="btn-pause" data-i18n-title="btn.pause.title" title="일시정지 (P)">⏸</button>
</div>
<div id="pause-ind" data-i18n="pause.ind">⏸ 일시정지</div>
<button class="cam-btn" id="btn-gear" data-i18n-title="btn.gear.title" title="설정" style="display:none">⚙️</button>

<button class="pixel-btn danger" id="btn-cancel-place" data-i18n="btn.cancelPlace">✖ 배치 취소</button>

<div class="panel" id="exp-panel">
  <h2 data-i18n="exp.panel.title">■ 지역 탐험</h2>
  <div id="exp-content"></div>
</div>

<div class="panel" id="render-panel">
  <h2 data-i18n="settings.title">■ 설정</h2>
  <label><span data-i18n="opt.pixel">픽셀 크기</span> <input type="range" id="opt-pixel" min="1" max="6" step="1" value="3"></label>
  <label><span data-i18n="opt.quant">색상 양자화</span> <input type="checkbox" id="opt-quant" checked></label>
  <label><span data-i18n="opt.dither">디더링</span> <input type="checkbox" id="opt-dither" checked></label>
  <label><span data-i18n="opt.ceil">실내 조명</span> <input type="checkbox" id="opt-ceil" checked></label>
  <label data-i18n-title="opt.autoeat.title" title="배고픔/갈증이 40 아래로 내려가면 자동으로 먹고 마십니다"><span data-i18n="opt.autoeat">자동 섭취</span> <input type="checkbox" id="opt-autoeat" checked></label>
  <label><span data-i18n="opt.fps">FPS 제한</span> <select id="opt-fps"><option value="60">60</option><option value="30">30</option></select></label>
  <label><span data-i18n="opt.lowspec">저사양 모드</span> <input type="checkbox" id="opt-lowspec"></label>
  <label id="bgidle-row"><span data-i18n="opt.bgidle">백그라운드 소리</span> <input type="checkbox" id="opt-bgidle" checked></label>
  <label id="bgm-row" style="display:none"><span data-i18n="opt.bgm">BGM</span> <input type="checkbox" id="opt-bgm"></label>
  <label id="bgmvol-row"><span data-i18n="opt.bgmvol">🔊 음량</span> <input type="range" id="opt-bgmvol" min="0" max="100" step="5" value="15"></label>
  <label id="sfxvol-row"><span data-i18n="opt.sfxvol">🔔 효과음</span> <input type="range" id="opt-sfxvol" min="0" max="100" step="5" value="70"></label>
  <label id="lang-row"><span data-i18n="opt.lang">언어 / Language</span> <select id="opt-lang"><option value="ko">한국어</option><option value="en">English</option></select></label>
  <div id="widget-section" style="display:none">
    <h2 data-i18n="widget.title">🪟 위젯 모드</h2>
    <label><span data-i18n="widget.opacity">투명도</span> <input type="range" id="opt-widget-opacity" min="30" max="100" step="5" value="100"></label>
    <label><span data-i18n="widget.alwaysontop">항상 위</span> <input type="checkbox" id="opt-widget-aot"></label>
    <label><span data-i18n="widget.mini">미니 창</span> <input type="checkbox" id="opt-widget-mini"></label>
    <label data-i18n-title="widget.clickthrough.title" title="켜면 게임 조작이 불가능해집니다. 해제는 트레이/작업표시줄에서 하세요."><span data-i18n="widget.clickthrough">클릭 통과</span> <input type="checkbox" id="opt-widget-clickthrough"></label>
  </div>
  <div class="btn-row">
    <button class="pixel-btn" id="btn-save-exp" data-i18n="btn.saveExp">💾 내보내기</button>
    <button class="pixel-btn" id="btn-save-imp" data-i18n="btn.saveImp">📂 가져오기</button>
  </div>
  <div class="btn-row">
    <button class="pixel-btn" id="btn-reset" data-i18n="btn.reset">🚪 타이틀로</button>
  </div>
</div>

<div class="panel" id="sel-panel">
  <h2 id="sel-name" data-i18n="sel.name">아이템</h2>
  <div class="swatches" id="sel-swatches"></div>
  <div class="btn-row">
    <button class="pixel-btn" id="btn-rotate" data-i18n="btn.rotate">회전 (R)</button>
    <button class="pixel-btn danger" id="btn-delete" data-i18n="btn.delete">회수 (Del)</button>
  </div>
</div>

<div class="panel" id="toolbar"></div>

<div id="quest-card">
  <div class="q-head">📌 <span data-i18n="quest.head">할 일</span></div>
  <div class="q-body">
    <div class="q-icon" id="quest-icon"></div>
    <div>
      <div class="q-text" id="quest-text"></div>
      <div class="q-prog" id="quest-prog"></div>
    </div>
  </div>
  <div class="q-check" id="quest-check">✅</div>
</div>

<div id="modal-back">
  <div class="panel" id="modal">
    <h2 id="modal-title"></h2>
    <div class="modal-body" id="modal-body"></div>
    <div class="close-row"><button class="pixel-btn" id="modal-close" data-i18n="modal.close">닫기</button></div>
  </div>
</div>
<div id="toast"></div>

<div id="journal-screen" style="display:none">
  <div id="journal-paper">
    <div id="journal-title"></div>
    <div id="journal-body"></div>
    <div id="journal-footer">
      <div id="journal-page-ind"></div>
      <div class="btn-row">
        <button class="pixel-btn" id="journal-prev" style="display:none">◂</button>
        <button class="pixel-btn primary" id="journal-next">▸</button>
      </div>
    </div>
  </div>
</div>

<div id="tip-note" style="display:none"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
