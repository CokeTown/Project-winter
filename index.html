<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title data-i18n="doc.title">Nine Winters</title>
<meta name="theme-color" content="#0e1014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nine Winters">
<link rel="manifest" href="%BASE_URL%manifest.webmanifest">
<link rel="icon" type="image/png" href="%BASE_URL%favicon.png">
<link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png">

</head>
<body>
<canvas id="c"></canvas>
<canvas id="fx"></canvas>
<div id="loading" data-i18n="loading">SHELTER LOADING . . .</div>
<!-- 모든 페이지 로드는 암전에서 시작 — 스타일시트/JS 로드 전의 맨 HTML이 절대 보이지 않도록
     핵심 스타일을 인라인으로 박는다. 부팅 완료 시 game.js가 페이드아웃. -->
<div id="fade-veil" style="position:fixed;inset:0;background:#07080b;opacity:1;pointer-events:auto;z-index:999"></div>

<div id="title-screen" style="display:none">
  <div id="title-inner">
    <div id="title-logo"><img src="img/logo_wordmark.png" alt="NINE WINTERS" draggable="false"></div>
    <div id="title-menu">
      <button class="pixel-btn primary" id="t-continue" style="display:none"><span data-i18n="title.continue">▶ 이어하기</span><br><span id="t-continue-info" style="font-size:9px;color:var(--text-dim)"></span></button>
      <button class="pixel-btn" id="t-new" data-i18n="title.new">✚ 새 게임</button>
      <button class="pixel-btn" id="t-load" data-i18n="title.load">💾 불러오기</button>
      <button class="pixel-btn" id="t-help" data-i18n="title.help">❓ 살아남는 법</button>
      <button class="pixel-btn" id="t-quit" data-i18n="title.quit" style="display:none">✖ 게임 종료</button>
      <div id="title-lang">
        <button class="pixel-btn lang-btn" id="lang-ko">한국어</button>
        <button class="pixel-btn lang-btn" id="lang-en">English</button>
      </div>
      <div id="title-tools">
        <button class="pixel-btn" id="t-export" data-i18n-title="title.tools.export" title="세이브 내보내기">💾</button>
        <button class="pixel-btn" id="t-import" data-i18n-title="title.tools.import" title="세이브 가져오기">📂</button>
        <button class="pixel-btn" id="t-settings" data-i18n-title="title.tools.settings" title="설정"><img class="sys-icon" src="img/icons/icon_sys_settings.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('⚙️'))"></button>
      </div>
    </div>
    <div id="title-ver" data-i18n="title.ver">Nine Winters · web build</div>
  </div>
</div>

<div id="intro-screen" style="display:none">
  <div id="intro-text"></div>
  <button class="pixel-btn primary" id="intro-next" data-i18n="intro.next">계속 ▸</button>
</div>

<div id="ending-screen" style="display:none">
  <div id="ending-text"></div>
  <button class="pixel-btn primary" id="ending-next" data-i18n="intro.next">계속 ▸</button>
</div>

<div class="panel" id="hud">
  <div class="shelter-name" id="hud-shelter" data-i18n="hud.shelter">🏚️ 셸터</div>
  <div class="stat" id="hud-stat" data-i18n="hud.stat">성공한 탐험 0회</div>
  <div id="gauges">
    <div class="gauge" id="g-hunger" data-i18n-title="g.hunger.title" title="배고픔 — 클릭하면 음식을 먹습니다"><div class="g-fill"></div><span class="g-label">🥫 80</span></div>
    <div class="gauge" id="g-thirst" data-i18n-title="g.thirst.title" title="갈증 — 클릭하면 물을 마십니다"><div class="g-fill"></div><span class="g-label">💧 80</span></div>
    <div class="gauge" id="g-energy" data-i18n-title="g.energy.title" title="에너지 — 탐험마다 소모, 취침으로 회복"><div class="g-fill"></div><span class="g-label">⚡ 100</span></div>
  </div>
  <div class="btn-row icons">
    <button class="pixel-btn primary" id="btn-exp" data-i18n-title="btn.exp.title" title="탐험 (지도)"><img class="act-icon" src="img/icons/icon_act_explore.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('🎒'))"><span class="act-lbl" data-i18n="btn.exp.lbl">탐험</span></button>
    <button class="pixel-btn" id="btn-move" data-i18n-title="btn.move.title" title="이주"><img class="act-icon" src="img/icons/icon_act_move.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('🏠'))"><span class="btn-badge" id="move-badge" data-i18n-title="move.badge.title" title="이주 가능한 거처가 있습니다" style="display:none">!</span><span class="act-lbl" data-i18n="btn.move.lbl">이주</span></button>
    <button class="pixel-btn" id="btn-craft" data-i18n-title="btn.craft.title" title="제작대"><img class="act-icon" src="img/icons/icon_act_craft.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('🔨'))"><span class="act-lbl" data-i18n="btn.craft.lbl">제작</span></button>
    <button class="pixel-btn" id="btn-knowledge" data-i18n-title="btn.knowledge.title" title="지식 (테크트리)"><span class="act-glyph" aria-hidden="true">📚</span><span class="act-lbl" data-i18n="btn.knowledge.lbl">지식</span></button>
    <button class="pixel-btn" id="btn-clean" data-i18n-title="btn.clean.title" title="청소 (물 1 → 청결 +20)"><img class="act-icon" src="img/icons/icon_act_clean.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('🧹'))"><span class="act-lbl" data-i18n="btn.clean.lbl">청소</span></button>
    <!-- #86④ 옷장 (디렉터 지목 UI 파트): 제작한 의류 갈아입기 — 아바타 탭으로도 열림 -->
    <!-- icon_act_wardrobe.png 미생성 → 계속 이모지 폴백이라 28px 아트와 정렬 어긋남(디렉터). 지식/도움처럼 act-glyph로 통일. -->
    <button class="pixel-btn" id="btn-wardrobe" data-i18n-title="btn.wardrobe.title" title="옷장 — 만든 옷을 갈아입는다"><span class="act-glyph" aria-hidden="true">👕</span><span class="act-lbl" data-i18n="btn.wardrobe.lbl">옷장</span></button>
    <!-- #87 스윕: 침대 그림만으로 '취침 버튼' 인지가 안 됨(디렉터) — Zzz 배지 상시 표기 -->
    <button class="pixel-btn" id="btn-sleep" data-i18n-title="btn.sleep.title" title="취침 — 내일 아침까지 자고 에너지 회복"><img class="act-icon" src="img/icons/icon_act_sleep.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('🛌'))"><span class="zzz-badge" aria-hidden="true">Zzz</span><span class="act-lbl" data-i18n="btn.sleep.lbl">취침</span></button>
    <button class="pixel-btn" id="btn-journal" data-i18n-title="btn.journal.title" title="일지 (도감·업적·통계)"><img class="act-icon" src="img/icons/icon_act_journal.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('📖'))"><span class="act-lbl" data-i18n="btn.journal.lbl">일지</span></button>
    <!-- #87 스윕: 기존 지도+나침반 그림이 '지도 버튼'으로 오독(디렉터) — 튜토리얼은 물음표 글리프로 -->
    <button class="pixel-btn" id="btn-help" data-i18n-title="btn.help.title" title="튜토리얼"><span class="act-glyph" aria-hidden="true">?</span><span class="act-lbl" data-i18n="btn.help.lbl">도움</span></button>
  </div>
</div>

<div class="panel" id="res-bar"><div id="res-chips"></div></div>

<div class="panel" id="clock-panel">
  <div id="lcd">
    <div id="lcd-day">DAY 01</div>
    <div id="lcd-time">08<span id="lcd-colon">:</span>00</div>
    <div id="lcd-sub">🌅 아침 · 🌤️</div>
  </div>
</div>

<div id="cam-ctrl">
  <!-- #87 스윕: 설정 톱니를 스택 밖 fixed(top:96px)에서 스택 첫 버튼으로 편입 — 세로폰 배율에서
       회전 버튼과 겹쳐 오탭 나던 실기기 신고. 표시 여부(터치 전용)는 기존 JS 그대로. -->
  <button class="cam-btn" id="btn-gear" data-i18n-title="btn.gear.title" title="설정" style="display:none"><img class="sys-icon" src="img/icons/icon_sys_settings.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('⚙️'))"></button>
  <button class="cam-btn" id="cam-rotl" data-i18n-title="cam.rotl.title" title="시점 좌회전 (Q)">⟲</button>
  <button class="cam-btn" id="cam-rotr" data-i18n-title="cam.rotr.title" title="시점 우회전 (E)">⟳</button>
  <button class="cam-btn" id="cam-zin" data-i18n-title="cam.zin.title" title="줌 인">＋</button>
  <button class="cam-btn" id="cam-zout" data-i18n-title="cam.zout.title" title="줌 아웃">－</button>
  <button class="cam-btn" id="cam-home" data-i18n-title="cam.home.title" title="시점 초기화">⌂</button>
  <button class="cam-btn" id="btn-pause" data-i18n-title="btn.pause.title" title="일시정지 (P)"><img class="sys-icon" src="img/icons/icon_sys_pause.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('⏸'))"></button>
  <button class="cam-btn" id="btn-auto" data-i18n-title="btn.auto.title" title="자동 진행"><img class="sys-icon" src="img/icons/icon_sys_auto.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('🤖'))"></button>
  <button class="cam-btn" id="btn-ui-pin" data-i18n-title="btn.uiPin.title" title="UI 배치 고정">📌</button>
  <button class="cam-btn" id="btn-ui-toggle" data-i18n-title="btn.uiToggle.title" title="게임 UI 숨기기">👁</button>
</div>
<!-- 편집(배치) 모드 — 하단 바 좌측 분리 (디렉터 UI 재배치: 우측 UI 하단화 + 편집 좌측) -->
<button class="cam-btn" id="btn-edit" data-i18n-title="btn.edit.title" title="배치 모드"><img class="sys-icon" src="img/icons/icon_sys_edit.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('🔧'))"></button>
<div id="pause-ind" data-i18n="pause.ind">⏸ 일시정지</div>
<!-- #14 게임패드 가상 커서 — 패드 입력 시에만 표시(마우스 이동 시 숨김) -->
<div id="pad-cursor" aria-hidden="true"></div>
<button class="pixel-btn danger" id="btn-cancel-place" data-i18n="btn.cancelPlace">✖ 배치 취소</button>

<div class="panel" id="exp-panel">
  <h2 data-i18n="exp.panel.title">■ 지역 탐험</h2>
  <div id="exp-content"></div>
</div>

<!-- 탭형 환경설정 창 (#52) — 타이틀/ESC/톱니 3경로 공용 전용 오버레이. z 65 (journal 60 < settings 65 < confirm 70). -->
<div id="settings-screen" style="display:none">
  <div class="panel" id="settings-window">
    <div id="settings-head">
      <h2 data-i18n="settings.title">■ 설정</h2>
      <button id="settings-x" aria-label="close">✕</button>
    </div>
    <div id="settings-tabs">
      <button class="settings-tab active" data-tab="graphics" data-i18n="settings.tab.graphics">그래픽</button>
      <button class="settings-tab" data-tab="sound" data-i18n="settings.tab.sound">사운드</button>
      <button class="settings-tab" data-tab="gameplay" data-i18n="settings.tab.gameplay">게임 플레이</button>
      <button class="settings-tab" data-tab="controls" data-i18n="settings.tab.controls">컨트롤</button>
    </div>
    <div id="settings-tabbody">
      <!-- ① 그래픽 -->
      <div class="settings-pane active" data-pane="graphics">
        <label><span data-i18n="opt.pixel">픽셀 크기</span> <input type="range" id="opt-pixel" min="1" max="6" step="1" value="3"></label>
        <label><span data-i18n="opt.quant">색상 양자화</span> <input type="checkbox" id="opt-quant" checked></label>
        <label><span data-i18n="opt.dither">디더링</span> <input type="checkbox" id="opt-dither" checked></label>
        <label><span data-i18n="opt.ceil">실내 조명</span> <input type="checkbox" id="opt-ceil" checked></label>
        <label><span data-i18n="opt.lowspec">저사양 모드</span> <input type="checkbox" id="opt-lowspec"></label>
        <label><span data-i18n="opt.fps">FPS 제한</span> <select id="opt-fps"><option value="60">60</option><option value="30">30</option></select></label>
        <h2 data-i18n="acc.title">♿ 접근성</h2>
        <label><span data-i18n="opt.fontscale">글자 크기</span> <select id="opt-fontscale">
          <option value="1" data-i18n="acc.font.normal">보통</option>
          <option value="1.12" data-i18n="acc.font.large">크게</option>
          <option value="1.25" data-i18n="acc.font.max">최대</option>
        </select></label>
        <label data-i18n-title="opt.colorblind.title" title="게이지와 요구 표시의 초록/빨강을 파랑/주황으로 바꿉니다"><span data-i18n="opt.colorblind">색약 팔레트</span> <input type="checkbox" id="opt-colorblind"></label>
        <label data-i18n-title="opt.reducemotion.title" title="게이지 깜빡임·배지 흔들림 등 반복 애니메이션을 멈춥니다"><span data-i18n="opt.reducemotion">흔들림 · 깜빡임 감소</span> <input type="checkbox" id="opt-reducemotion"></label>
        <div id="display-section" style="display:none">
          <h2 data-i18n="display.title">🖥️ 디스플레이</h2>
          <label><span data-i18n="opt.dispmode">화면 모드</span> <select id="opt-dispmode">
            <option value="windowed" data-i18n="disp.windowed">창 화면</option>
            <option value="fullscreen" data-i18n="disp.fullscreen">전체화면</option>
            <option value="borderless" data-i18n="disp.borderless">창없는 전체화면</option>
          </select></label>
          <label id="dispres-row"><span data-i18n="opt.dispres">해상도</span> <select id="opt-dispres"></select></label>
          <div class="btn-row"><button class="pixel-btn primary" id="btn-disp-apply" data-i18n="disp.apply">✓ 적용</button></div>
        </div>
        <div id="widget-section" style="display:none">
          <h2 data-i18n="widget.title">🪟 위젯 모드</h2>
          <label><span data-i18n="widget.opacity">투명도</span> <input type="range" id="opt-widget-opacity" min="30" max="100" step="5" value="100"></label>
          <label><span data-i18n="widget.alwaysontop">항상 위</span> <input type="checkbox" id="opt-widget-aot"></label>
          <label><span data-i18n="widget.mini">미니 창</span> <input type="checkbox" id="opt-widget-mini"></label>
          <label data-i18n-title="widget.clickthrough.title" title="켜면 게임 조작이 불가능해집니다. 해제는 트레이/작업표시줄에서 하세요."><span data-i18n="widget.clickthrough">클릭 통과</span> <input type="checkbox" id="opt-widget-clickthrough"></label>
        </div>
      </div>
      <!-- ② 사운드 -->
      <div class="settings-pane" data-pane="sound">
        <label id="bgm-row" style="display:none"><span data-i18n="opt.bgm">BGM</span> <input type="checkbox" id="opt-bgm"></label>
        <label id="bgmvol-row"><span data-i18n="opt.bgmvol">🔊 음량</span> <input type="range" id="opt-bgmvol" min="0" max="100" step="5" value="15"></label>
        <label id="sfxvol-row"><span data-i18n="opt.sfxvol">🔔 효과음</span> <input type="range" id="opt-sfxvol" min="0" max="100" step="5" value="70"></label>
        <label id="bgidle-row"><span data-i18n="opt.bgidle">백그라운드 소리</span> <input type="checkbox" id="opt-bgidle" checked></label>
      </div>
      <!-- ③ 게임 플레이 -->
      <div class="settings-pane" data-pane="gameplay">
        <label data-i18n-title="opt.autoeat.title" title="배고픔/갈증이 40 아래로 내려가면 자동으로 먹고 마십니다"><span data-i18n="opt.autoeat">자동 섭취</span> <input type="checkbox" id="opt-autoeat" checked></label>
        <label id="autoplay-row" data-i18n-title="opt.autoplay.title" title="Day 10부터 사용 가능. 매 정시마다 생존 루틴을 대신 처리합니다"><span data-i18n="opt.autoplay">자동 진행</span> <input type="checkbox" id="opt-autoplay"></label>
        <label id="lang-row"><span data-i18n="opt.lang">언어 / Language</span> <select id="opt-lang"><option value="ko">한국어</option><option value="en">English</option></select></label>
      </div>
      <!-- ④ 컨트롤 -->
      <div class="settings-pane" data-pane="controls">
        <div id="controls-guide"></div>
      </div>
    </div>
    <div id="settings-foot">
      <button class="pixel-btn" id="btn-save-now" data-i18n="btn.saveNow" data-i18n-title="btn.saveNow.title" title="지금 저장">💾 저장</button>
      <button class="pixel-btn" id="btn-settings-default" data-i18n="settings.default">기본값</button>
      <button class="pixel-btn" id="btn-reset" data-i18n="btn.reset">🚪 타이틀로</button>
      <button class="pixel-btn primary" id="btn-settings-close" data-i18n="settings.close">닫기</button>
    </div>
  </div>
</div>

<div class="panel" id="sel-panel">
  <h2 id="sel-name" data-i18n="sel.name">아이템</h2>
  <div class="swatches" id="sel-swatches"></div>
  <div class="btn-row">
    <button class="pixel-btn" id="btn-rotate" data-i18n="btn.rotate">회전 (R)</button>
    <button class="pixel-btn danger" id="btn-delete" data-i18n="btn.delete">회수 (Del)</button>
  </div>
</div>

<div class="panel" id="toolbar"></div>

<div id="quest-card">
  <div class="q-head"><img class="sys-icon" src="img/icons/icon_sys_quest.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('📌'))"> <span data-i18n="quest.head">할 일</span></div>
  <div class="q-lore" id="quest-lore"></div>
  <div class="q-body">
    <div class="q-icon" id="quest-icon"></div>
    <div>
      <div class="q-text" id="quest-text"></div>
      <div class="q-prog" id="quest-prog"></div>
    </div>
  </div>
  <div class="q-check" id="quest-check"><img class="sys-icon" src="img/icons/icon_sys_check.png" alt="" draggable="false" onerror="this.replaceWith(document.createTextNode('✅'))"></div>
</div>

<!-- 인게임 확인창 — window.confirm(브라우저 네이티브 알림창) 대체. 모달 위에도 뜬다(z 70) -->
<div id="confirm-back" style="display:none">
  <div class="panel" id="confirm-panel">
    <div id="confirm-msg"></div>
    <div class="close-row">
      <button class="pixel-btn primary" id="confirm-yes"></button>
      <button class="pixel-btn" id="confirm-no"></button>
    </div>
  </div>
</div>
<div id="modal-back">
  <div class="panel" id="modal">
    <h2 id="modal-title"></h2>
    <div class="modal-body" id="modal-body"></div>
    <div class="close-row"><button class="pixel-btn" id="modal-close" data-i18n="modal.close">닫기</button></div>
  </div>
</div>
<div id="toast"></div>

<div id="journal-screen" style="display:none">
  <div id="journal-paper">
    <div id="journal-title"></div>
    <div id="journal-body"></div>
    <div id="journal-footer">
      <div id="journal-page-ind"></div>
      <div class="btn-row">
        <button class="pixel-btn" id="journal-prev" style="display:none">◂</button>
        <button class="pixel-btn primary" id="journal-next">▸</button>
      </div>
    </div>
  </div>
</div>
