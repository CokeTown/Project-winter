<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Project Shelter — 폐허 속에서, 나만의 집을</title>
<meta name="theme-color" content="#0e1014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Project Shelter">
<link rel="manifest" href="%BASE_URL%manifest.webmanifest">

</head>
<body>
<canvas id="c"></canvas>
<canvas id="fx"></canvas>
<div id="loading">SHELTER LOADING . . .</div>

<div id="title-screen" style="display:none">
  <div id="title-inner">
    <div id="title-logo">PROJECT<br>SHELTER</div>
    <div id="title-sub">폐허 속에서, 나만의 집을</div>
    <div id="title-menu">
      <button class="pixel-btn primary" id="t-continue" style="display:none">▶ 이어하기<br><span id="t-continue-info" style="font-size:9px;color:var(--text-dim)"></span></button>
      <button class="pixel-btn" id="t-new">✚ 새 게임</button>
      <button class="pixel-btn" id="t-load">💾 불러오기</button>
      <button class="pixel-btn" id="t-help">❓ 살아남는 법</button>
    </div>
    <div id="title-ver">Project_winter · web build</div>
  </div>
</div>

<div id="intro-screen" style="display:none">
  <div id="intro-text"></div>
  <button class="pixel-btn primary" id="intro-next">계속 ▸</button>
</div>

<div id="ending-screen" style="display:none">
  <div id="ending-text"></div>
  <button class="pixel-btn primary" id="ending-next">계속 ▸</button>
</div>

<div class="panel" id="hud">
  <div class="shelter-name" id="hud-shelter">🏚️ 셸터</div>
  <div class="stat" id="hud-stat">성공한 탐험 0회</div>
  <div id="gauges">
    <div class="gauge" id="g-hunger" title="배고픔 — 클릭하면 음식을 먹습니다"><div class="g-fill"></div><span class="g-label">🥫 80</span></div>
    <div class="gauge" id="g-thirst" title="갈증 — 클릭하면 물을 마십니다"><div class="g-fill"></div><span class="g-label">💧 80</span></div>
    <div class="gauge" id="g-energy" title="에너지 — 탐험마다 소모, 취침으로 회복"><div class="g-fill"></div><span class="g-label">⚡ 100</span></div>
  </div>
  <div class="btn-row icons">
    <button class="pixel-btn primary" id="btn-exp" title="탐험 (지도)">🎒</button>
    <button class="pixel-btn" id="btn-move" title="이주">🏠</button>
    <button class="pixel-btn" id="btn-craft" title="제작대">🔨</button>
    <button class="pixel-btn" id="btn-clean" title="청소 (물 1 → 청결 +20)">🧹</button>
    <button class="pixel-btn" id="btn-sleep" title="취침 — 내일 아침까지 자고 에너지 회복">🛌</button>
    <button class="pixel-btn" id="btn-journal" title="일지 (도감·업적·통계)">📖</button>
    <button class="pixel-btn" id="btn-help" title="튜토리얼">🎓</button>
  </div>
</div>

<div class="panel" id="res-bar"><div id="res-chips"></div></div>

<div class="panel" id="clock-panel">
  <div id="lcd">
    <div id="lcd-day">DAY 01</div>
    <div id="lcd-time">08<span id="lcd-colon">:</span>00</div>
    <div id="lcd-sub">🌅 아침 · 🌤️</div>
  </div>
</div>

<div id="cam-ctrl">
  <button class="cam-btn" id="cam-rotl" title="시점 좌회전 (Q)">⟲</button>
  <button class="cam-btn" id="cam-rotr" title="시점 우회전 (E)">⟳</button>
  <button class="cam-btn" id="cam-zin" title="줌 인">＋</button>
  <button class="cam-btn" id="cam-zout" title="줌 아웃">－</button>
  <button class="cam-btn" id="cam-home" title="시점 초기화">⌂</button>
  <button class="cam-btn" id="btn-pause" title="일시정지 (P)">⏸</button>
</div>
<div id="pause-ind">⏸ 일시정지</div>

<button class="pixel-btn danger" id="btn-cancel-place">✖ 배치 취소</button>

<div class="panel" id="exp-panel">
  <h2>■ 지역 탐험</h2>
  <div id="exp-content"></div>
</div>

<div class="panel" id="render-panel">
  <h2>■ 설정</h2>
  <label>픽셀 크기 <input type="range" id="opt-pixel" min="1" max="6" step="1" value="3"></label>
  <label>색상 양자화 <input type="checkbox" id="opt-quant" checked></label>
  <label>디더링 <input type="checkbox" id="opt-dither" checked></label>
  <label>실내 조명 <input type="checkbox" id="opt-ceil" checked></label>
  <label title="배고픔/갈증이 40 아래로 내려가면 자동으로 먹고 마십니다">자동 섭취 <input type="checkbox" id="opt-autoeat" checked></label>
  <label id="bgm-row" style="display:none">BGM <input type="checkbox" id="opt-bgm"></label>
  <label id="bgmvol-row">🔊 음량 <input type="range" id="opt-bgmvol" min="0" max="100" step="5" value="35"></label>
  <div class="btn-row">
    <button class="pixel-btn" id="btn-reset">🚪 타이틀로</button>
  </div>
</div>

<div class="panel" id="sel-panel">
  <h2 id="sel-name">아이템</h2>
  <div class="swatches" id="sel-swatches"></div>
  <div class="btn-row">
    <button class="pixel-btn" id="btn-rotate">회전 (R)</button>
    <button class="pixel-btn danger" id="btn-delete">회수 (Del)</button>
  </div>
</div>

<div class="panel" id="toolbar"></div>

<div id="modal-back">
  <div class="panel" id="modal">
    <h2 id="modal-title"></h2>
    <div class="modal-body" id="modal-body"></div>
    <div class="close-row"><button class="pixel-btn" id="modal-close">닫기</button></div>
  </div>
</div>
<div id="toast"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
